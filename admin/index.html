<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - CrackedTier</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
  <!-- Login Screen -->
  <div class="auth-container" id="admin-login" style="display:none;">
    <div class="auth-box">
      <h1>Admin Login</h1>
      <p>Sign in with your admin account</p>
      <div class="auth-form">
        <div>
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="admin@example.com" autocomplete="email">
        </div>
        <div>
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
        </div>
        <div class="auth-error" id="login-error"></div>
        <button class="auth-btn" onclick="Admin.handleLogin()">Sign In</button>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="admin-dashboard" style="display:none;">
    <nav class="navbar">
      <a href="../index.html" class="navbar-logo">
        <img src="../assets/logo.svg" alt="CrackedTier">
        <span>Cracked<span>Tier</span></span>
      </a>
      <ul class="navbar-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../rankings.html">Rankings</a></li>
        <li><a href="#">Discords</a></li>
        <li><a href="#">API Docs</a></li>
      </ul>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:12px;color:var(--text-secondary);font-weight:500;" id="admin-email-display"></span>
        <button class="admin-logout-btn" onclick="Admin.handleLogout()">Logout</button>
      </div>
    </nav>

    <div class="admin-container">
      <div class="admin-header">
        <h1>Admin Dashboard</h1>
        <span style="font-size:12px;color:var(--text-secondary);font-weight:500;">Manage players and rankings</span>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="add-panel">Add Player</button>
        <button class="admin-tab" data-tab="edit-panel">Edit Player</button>
        <button class="admin-tab" data-tab="manage-panel">Manage Players</button>
      </div>

      <!-- Add Player Panel -->
      <div class="admin-panel active" id="add-panel">
        <form class="admin-form" id="add-player-form">
          <div class="full-width">
            <label for="add-username">Username</label>
            <input type="text" id="add-username" placeholder="e.g. FuryMC" required>
          </div>
          <div>
            <label for="add-avatar">Avatar URL</label>
            <input type="url" id="add-avatar" placeholder="https://example.com/avatar.png">
          </div>
          <div>
            <label for="add-region">Region</label>
            <select id="add-region">
              <option value="">Select region</option>
              <option value="NA">NA</option>
              <option value="EU">EU</option>
              <option value="ASIA">ASIA</option>
              <option value="OCE">OCE</option>
              <option value="SA">SA</option>
            </select>
          </div>
          <div>
            <label for="add-title">Combat Title</label>
            <input type="text" id="add-title" placeholder="e.g. PvP Champion">
          </div>
          <div>
            <label for="add-points">Points</label>
            <input type="number" id="add-points" placeholder="0" min="0">
          </div>
          <div>
            <label for="add-overallrank">Overall Rank</label>
            <input type="number" id="add-overallrank" placeholder="1" min="0">
          </div>
          <div>
            <label for="add-namemc">NameMC URL</label>
            <input type="url" id="add-namemc" placeholder="https://namemc.com/profile/...">
          </div>
          <div>
            <label for="add-discord">Discord (optional)</label>
            <input type="text" id="add-discord" placeholder="discord#0000">
          </div>

          <div class="full-width section-label" style="margin:8px 0 0;">Kit Tiers</div>

          <div>
            <label for="add-tier-vanilla">Vanilla Tier</label>
            <select id="add-tier-vanilla">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="add-tier-ltms">LTMs Tier</label>
            <select id="add-tier-ltms">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="add-tier-uhc">UHC Tier</label>
            <select id="add-tier-uhc">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="add-tier-pot">Pot Tier</label>
            <select id="add-tier-pot">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="add-tier-nethop">NethOP Tier</label>
            <select id="add-tier-nethop">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="add-tier-smp">SMP Tier</label>
            <select id="add-tier-smp">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="add-tier-sword">Sword Tier</label>
            <select id="add-tier-sword">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="add-tier-axe">Axe Tier</label>
            <select id="add-tier-axe">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="add-tier-mace">Mace Tier</label>
            <select id="add-tier-mace">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>

          <div class="admin-form-actions">
            <button type="submit" class="admin-btn admin-btn-save">Save Player</button>
          </div>
        </form>
      </div>

      <!-- Edit Player Panel -->
      <div class="admin-panel" id="edit-panel">
        <form class="admin-form" id="edit-player-form" onsubmit="event.preventDefault();">
          <div class="full-width">
            <label for="edit-username">Username</label>
            <input type="text" id="edit-username" placeholder="e.g. FuryMC" required>
          </div>
          <div>
            <label for="edit-avatar">Avatar URL</label>
            <input type="url" id="edit-avatar" placeholder="https://example.com/avatar.png">
          </div>
          <div>
            <label for="edit-region">Region</label>
            <select id="edit-region">
              <option value="">Select region</option>
              <option value="NA">NA</option>
              <option value="EU">EU</option>
              <option value="ASIA">ASIA</option>
              <option value="OCE">OCE</option>
              <option value="SA">SA</option>
            </select>
          </div>
          <div>
            <label for="edit-title">Combat Title</label>
            <input type="text" id="edit-title" placeholder="e.g. PvP Champion">
          </div>
          <div>
            <label for="edit-points">Points</label>
            <input type="number" id="edit-points" placeholder="0" min="0">
          </div>
          <div>
            <label for="edit-overallrank">Overall Rank</label>
            <input type="number" id="edit-overallrank" placeholder="1" min="0">
          </div>
          <div>
            <label for="edit-namemc">NameMC URL</label>
            <input type="url" id="edit-namemc" placeholder="https://namemc.com/profile/...">
          </div>
          <div>
            <label for="edit-discord">Discord (optional)</label>
            <input type="text" id="edit-discord" placeholder="discord#0000">
          </div>

          <div class="full-width section-label" style="margin:8px 0 0;">Kit Tiers</div>

          <div>
            <label for="edit-tier-vanilla">Vanilla Tier</label>
            <select id="edit-tier-vanilla">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="edit-tier-ltms">LTMs Tier</label>
            <select id="edit-tier-ltms">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="edit-tier-uhc">UHC Tier</label>
            <select id="edit-tier-uhc">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="edit-tier-pot">Pot Tier</label>
            <select id="edit-tier-pot">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="edit-tier-nethop">NethOP Tier</label>
            <select id="edit-tier-nethop">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="edit-tier-smp">SMP Tier</label>
            <select id="edit-tier-smp">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="edit-tier-sword">Sword Tier</label>
            <select id="edit-tier-sword">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="edit-tier-axe">Axe Tier</label>
            <select id="edit-tier-axe">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>
          <div>
            <label for="edit-tier-mace">Mace Tier</label>
            <select id="edit-tier-mace">
              <option value="">None</option>
              <option value="HT1">HT1</option>
              <option value="HT2">HT2</option>
              <option value="HT3">HT3</option>
              <option value="LT1">LT1</option>
              <option value="LT2">LT2</option>
            </select>
          </div>

          <div class="admin-form-actions">
            <button type="button" class="admin-btn admin-btn-save" onclick="Admin.saveEditPlayer()">Update Player</button>
            <button type="button" class="admin-btn admin-btn-delete" onclick="Admin.deletePlayer()">Delete</button>
            <button type="button" class="admin-btn admin-btn-preview" onclick="Admin.previewPlayer()">Preview</button>
          </div>
        </form>
      </div>

      <!-- Manage Players Panel -->
      <div class="admin-panel" id="manage-panel">
        <div class="admin-search">
          <input type="text" id="admin-search-input" placeholder="Search players..." oninput="Admin.initSearch()">
        </div>
        <div class="admin-player-list" id="manage-player-list">
          <div class="loading-text">Loading players...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/firebase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
